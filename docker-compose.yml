version: '3.8'

services:
  mongodb:
    image: mongo:latest
    container_name: cosmic_mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    networks:
      - cosmic_network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: cosmic_backend
    ports:
      - "5000:5000"
    volumes:
      - ./backend:/app
      - /app/node_modules
      - ./backend/uploads:/app/uploads
    environment:
      - PORT=5000
      - MONGODB_URI=mongodb://mongodb:27017/astrology-platform
      - JWT_SECRET=super_secret_tumhara_pandit_jwt_key_12345
      - NODE_ENV=development
    depends_on:
      - mongodb
    networks:
      - cosmic_network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: cosmic_frontend
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend
    networks:
      - cosmic_network

networks:
  cosmic_network:
    driver: bridge

volumes:
  mongo_data:
    driver: local
